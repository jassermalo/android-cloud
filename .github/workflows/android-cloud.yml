name: Android Cloud

on:
  workflow_dispatch:

jobs:
  android-cloud:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb x11vnc openbox libpulse0 libpulse-dev wget

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1080x2340x24 &
          sleep 2
          DISPLAY=:99 openbox &
          sleep 1
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Download bore
        run: |
          wget -q https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz -O /tmp/bore.tar.gz
          tar xzf /tmp/bore.tar.gz -C /tmp/ && chmod +x /tmp/bore

      - name: Prepare runner script
        run: |
          cat > /tmp/run.sh << 'BASH'
          #!/bin/bash
          echo "Android 13 booted with Google Play!"
          adb shell input keyevent 82
          sleep 2
          adb shell input keyevent 82

          # Start VNC - captures the X display where emulator window is drawn
          x11vnc -display :99 -nopw -forever -shared -bg -rfbport 5900 -quiet -noncache
          echo "VNC started on port 5900"

          # Bore tunnel
          /tmp/bore local 5900 --to bore.pub > /tmp/bore_out.txt 2>&1 &
          sleep 12
          PORT=$(grep -oP 'bore\.pub:\K\d+' /tmp/bore_out.txt | head -1)
          [ -z "$PORT" ] && PORT=$(grep -oE ':[0-9]{4,5}' /tmp/bore_out.txt | tail -1 | tr -d ':')

          echo ""
          echo "==============================="
          echo "   ANDROID 13 CLOUD READY!"
          echo "==============================="
          echo "  VNC    : bore.pub:$PORT"
          echo "  Pass   : (none - press OK)"
          echo "  OS     : Android 13 (API 33)"
          echo "  RAM    : 4GB"
          echo "  Play   : Google Play Store"
          echo "==============================="

          while true; do
            echo "[$(date '+%H:%M:%S')] Active - bore.pub:$PORT"
            sleep 60
          done
          BASH
          chmod +x /tmp/run.sh

      - name: Run Android 13 Cloud
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          target: google_apis_playstore
          profile: pixel_6
          disable-animations: true
          ram-size: 4096M
          heap-size: 1024M
          cores: 2
          emulator-options: -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
          script: bash /tmp/run.sh
