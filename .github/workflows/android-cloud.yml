name: Android Cloud

on:
  workflow_dispatch:

jobs:
  android-cloud:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install VNC + display tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb x11vnc

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1080x1920x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 2
          echo "Virtual display ready"

      - name: Download bore tunnel
        run: |
          wget -q https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz -O /tmp/bore.tar.gz
          tar xzf /tmp/bore.tar.gz -C /tmp/
          chmod +x /tmp/bore
          echo "bore ready"

      - name: Run Android Cloud (Emulator + VNC + Tunnel)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 28
          arch: x86_64
          profile: Nexus 6
          disable-animations: true
          ram-size: 2048M
          heap-size: 512M
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
          script: |
            echo "Emulator booted successfully!"
            adb shell input keyevent 82

            # Start VNC server
            x11vnc -display :99 -nopw -forever -shared -bg -rfbport 5900 -quiet
            echo "VNC server started on port 5900"

            # Start bore tunnel
            /tmp/bore local 5900 --to bore.pub > /tmp/bore_out.txt 2>&1 &
            sleep 10

            PORT=$(grep -oP 'bore\.pub:\K\d+' /tmp/bore_out.txt | head -1)
            if [ -z "$PORT" ]; then
              PORT=$(grep -oP ':\K\d{4,5}' /tmp/bore_out.txt | head -1)
            fi

            echo ""
            echo "==============================="
            echo "    ANDROID CLOUD IS READY!"
            echo "==============================="
            echo ""
            echo "  VNC Address : bore.pub:$PORT"
            echo "  Password    : (none - press OK)"
            echo ""
            echo "  VNC Clients (free):"
            echo "  - RealVNC Viewer  (PC/Mac)"
            echo "  - bVNC            (Android)"
            echo ""
            echo "  Android     : 9.0 (API 28)"
            echo "  Screen      : 1080x1920"
            echo "==============================="

            while true; do
              echo "[$(date '+%H:%M:%S')] Android Cloud Active - bore.pub:$PORT"
              sleep 60
            done
